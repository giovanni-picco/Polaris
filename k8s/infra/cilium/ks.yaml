---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-cilium-app
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/infra/cilium/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-cilium-config
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/infra/cilium/config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-cilium-app
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config