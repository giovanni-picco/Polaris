apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  interval: 10m

  chart:
    spec:
      chart: cilium
      version: "1.19.4"
      sourceRef:
        kind: HelmRepository
        namespace: kube-system
        name: cilium

  install:
    crds: Create

  upgrade:
    crds: CreateReplace
    cleanupOnFail: true

  values:
    kubeProxyReplacement: true
    k8sServiceHost: 10.10.5.10
    k8sServicePort: 6443

    ipam:
      mode: kubernetes

    bpf:
      masquerade: true

    l2announcements:
      enabled: true

    externalIPs:
      enabled: true

    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup

    operator:
      replicas: 1

    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE