apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  interval: 5m
  chart:
    spec:
      chart: longhorn
      version: "1.11.1"
      sourceRef:
        kind: HelmRepository
        namespace: longhorn-system
        name: longhorn

  install:
    crds: Create

  upgrade:
    crds: CreateReplace
    cleanupOnFail: true

  values:
    persistence:
      defaultClassReplicaCount: 1

    defaultSettings:
      logLevel: Warn

    defaultBackupStore:
      backupTarget: "nfs://nas-01.aethernode.it:/volume1/polaris-backups"