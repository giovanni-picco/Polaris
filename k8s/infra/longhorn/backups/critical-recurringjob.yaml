---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: critical-snapshot
  namespace: longhorn-system
spec:
  cron: "0 */2 * * *"
  task: snapshot
  groups: []
  retain: 12
  concurrency: 1
  labels:
    tier: critical
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: critical-backup
  namespace: longhorn-system
spec:
  cron: "0 3 * * *"
  task: backup
  groups: []
  retain: 7
  concurrency: 1
  labels:
    tier: critical