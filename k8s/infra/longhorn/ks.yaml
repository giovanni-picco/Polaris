---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-longhorn-app
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/infra/longhorn/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-longhorn-classes
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/infra/longhorn/classes
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-longhorn-app
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-longhorn-backups
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/infra/longhorn/backups
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-longhorn-classes
