apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-critical
  annotations:
    longhorn.io/description: "Volumi critici, snapshot frequenti + backup giornaliero"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
  fsType: ext4
  dataLocality: strict-local
  recurringJobSelector: '[{"name":"critical-snapshot","isGroup":false},{"name":"critical-backup","isGroup":false}]'