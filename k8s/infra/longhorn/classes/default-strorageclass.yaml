apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-default
  annotations:
    longhorn.io/description: "Volumi standard, snapshot + backup settimanale"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
  fsType: ext4
  dataLocality: strict-local
  recurringJobSelector: '[{"name":"default-snapshot","isGroup":false},{"name":"default-backup","isGroup":false}]'