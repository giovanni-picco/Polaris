apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  interval: 10m
  chart:
    spec:
      chart: cert-manager
      version: "v1.20.3"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: cert-manager

  install:
    crds: Create

  upgrade:
    crds: CreateReplace
    cleanupOnFail: true

  values:
    crds:
      enabled: true
      keep: false