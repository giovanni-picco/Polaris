apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: n8n-pg
  namespace: n8n
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.9
  primaryUpdateStrategy: unsupervised
  bootstrap:
    initdb:
      database: n8n
      owner: n8n
  storage:
    size: 10Gi
    storageClass: longhorn-default
  resources:
    requests:
      cpu: 500m 
      memory: 1Gi
    limits:
      cpu: 750m
      memory: 2Gi