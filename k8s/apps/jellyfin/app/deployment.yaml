apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: jellyfin
          image: docker.io/jellyfin/jellyfin:10.11.11

          env:
            - name: JELLYFIN_PublishedServerUrl
              value: http://jellyfin.${CLUSTER_DOMAIN}

          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "Waiting for system.xml to enable metrics..."
                    timeout=300 # 5 minutes timeout
                    interval=5  # Check every 5 seconds
                    elapsed=0
                    while [ ! -f /config/config/system.xml ]; do
                      if [ $elapsed -ge $timeout ]; then
                        echo "ERROR: Timed out waiting for /config/config/system.xml" >&2
                        exit 1
                      fi
                      sleep $interval
                      elapsed=$((elapsed + interval))
                    done
                    echo "Found /config/config/system.xml, enabling metrics..."
                    # Check if metrics are already enabled before running sed
                    if ! grep -q '<EnableMetrics>true</EnableMetrics>' /config/config/system.xml; then
                      sed 's,<EnableMetrics>false</EnableMetrics>,<EnableMetrics>true</EnableMetrics>,' -i /config/config/system.xml
                      if [ $? -eq 0 ]; then
                        echo "Metrics enabled successfully."
                      else
                        echo "ERROR: Failed to enable metrics in /config/config/system.xml" >&2
                        exit 1
                      fi
                    else
                      echo "Metrics already enabled."
                    fi
                    exit 0

          ports:
            - name: http
              containerPort: 8096
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            privileged: false
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault

          resources:
            requests:
              cpu: 500m
              memory: 512Mi
              gpu.intel.com/i915: "1"
            limits:
              cpu: 2000m
              memory: 4Gi
              gpu.intel.com/i915: "1"
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 30

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /media
              name: media
              readOnly: true
            - mountPath: /cache
              name: cache

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: media
          persistentVolumeClaim:
            claimName: media-jellyfin-pvc
        - name: cache
          emptyDir: {}