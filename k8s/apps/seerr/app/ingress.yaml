apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seerr
  namespace: seerr
  annotations:
    external-dns.alpha.kubernetes.io/hostname: &domain seerr.${CLUSTER_DOMAIN}
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - *domain
      secretName: seerr-tls
  rules:
    - host: *domain
      http:
        paths:
          - backend:
              service:
                name: seerr
                port:
                  number: 5055
            path: /
            pathType: Prefix
