apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: arr-stack
  labels:
    app: sonarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      containers:
        - name: sonarr
          image: ghcr.io/linuxserver/sonarr:4.0.19
          env:
            - name: TZ
              value: "Europe/Rome"

            - name: SONARR__AUTH__ENABLED
              value: "true"
            - name: SONARR__AUTH__METHOD
              value: "External"
            - name: SONARR__AUTH__REQUIRED
              value: "DisabledForLocalAddresses"

            - name: SONARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  name: sonarr-secrets
                  key: apikey

          ports:
            - containerPort: &port 8989
              name: http

          volumeMounts:
            - name: sonarr-config
              mountPath: /config
            - name: media-root
              mountPath: /data

          livenessProbe:
            httpGet:
              path: /ping
              port: *port
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ping
              port: *port
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"

      volumes:
        - name: sonarr-config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: media-root
          persistentVolumeClaim:
            claimName: media-root