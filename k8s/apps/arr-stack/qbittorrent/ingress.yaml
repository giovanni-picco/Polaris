apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbittorrent
  namespace: arr-stack
  annotations:
    external-dns.alpha.kubernetes.io/hostname: &domain qbittorrent.${CLUSTER_DOMAIN}
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: arr-stack-authentik@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - *domain
      secretName: qbittorrent-tls
  rules:
    - host: *domain
      http:
        paths:
          - backend:
              service:
                name: qbittorrent
                port:
                  number: 8080
            path: /
            pathType: Prefix
