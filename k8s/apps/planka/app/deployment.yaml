apiVersion: apps/v1
kind: Deployment
metadata:
  name: planka
  namespace: planka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: planka
  template:
    metadata:
      labels:
        app: planka
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: planka
          image: ghcr.io/plankanban/planka:2.1.1
          env:
            - name: BASE_URL
              value: "https://planka.${CLUSTER_DOMAIN}"
            - name: LOG_LEVEL
              value: "info"
            - name: TZ
              value: "Europe/Rome"

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: secret-key
                  key: key

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: planka-pg-app
                  key: fqdn-uri

            - name: OIDC_ISSUER
              value: "https://sso.${CLUSTER_DOMAIN}/application/o/planka/"
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: sso-client
                  key: client_id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sso-client
                  key: client_secret
            - name: OIDC_SCOPES
              value: "openid profile email"
            - name: OIDC_ADMIN_ROLES
              value: "admin"

            - name: SMTP_HOST
              value: "smtp-relay.brevo.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_NAME
              value: "no_reply@${CLUSTER_DOMAIN}"
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: smtp-cred
                  key: username
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smtp-cred
                  key: password

          ports:
            - name: http
              containerPort: 1337
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            privileged: false
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault

          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          volumeMounts:
            - mountPath: /app/data
              name: data
            - mountPath: /app/logs
              subPath: app-logs
              name: emptydir
            - mountPath: /app/.tmp
              subPath: app-tmp
              name: emptydir
            - mountPath: /tmp
              subPath: tmp
              name: emptydir

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: planka-data
        - name: emptydir
          emptyDir: {}