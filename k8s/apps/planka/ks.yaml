apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-planka-db
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/apps/planka/database
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-planka-app
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/apps/planka/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: apps-planka-db
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config