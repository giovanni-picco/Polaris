apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 5m
  chart:
    spec:
      chart: external-secrets
      version: "2.4.1"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system

  install:
    crds: Create

  upgrade:
    crds: CreateReplace
    cleanupOnFail: true

  values:
    bitwarden-sdk-server:
      enabled: true