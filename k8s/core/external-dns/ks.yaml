apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: core-external-dns-unifi
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/core/external-dns/unifi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: core-external-secrets-bitwarden
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config