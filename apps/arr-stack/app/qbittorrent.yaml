---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: arr-stack
  labels:
    app: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1
          securityContext:
            privileged: true
            capabilities:
              add: ["NET_ADMIN"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: tcp-shadowsocks
              containerPort: 6881
              protocol: TCP
            - name: udp-shadowsocks
              containerPort: 6881
              protocol: UDP
          envFrom:
            - configMapRef:
                name: gluetun-configmap
          env:
            - name: VPN_TYPE
              value: "wireguard"
            - name: WIREGUARD_ADDRESSES
              value: "10.5.0.2/32"
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gluetun-secret
                  key: WIREGUARD_SECRET
            - name: FIREWALL_INPUT_PORTS
              value: "8080,6881"
          restartPolicy: Always
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "ping -c 1 google.it"
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "ping -c 1 google.it"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.1.4
          env:
            - name: TZ
              value: Europe/Rome
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - name: http
              protocol: TCP
              containerPort: 8080
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: media-torrents
              mountPath: /data/torrents
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "500m"
      volumes:
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: pvc-config-qbittorrent
        - name: media-torrents
          persistentVolumeClaim:
            claimName: pvc-media-torrents

---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: arr-stack
spec:
  selector:
    app: qbittorrent
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbittorrent
  namespace: arr-stack
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    external-dns.alpha.kubernetes.io/hostname: qbittorrent.${CLUSTER_DOMAIN}
spec:
  ingressClassName: cilium
  tls:
    - hosts:
        - qbittorrent.${CLUSTER_DOMAIN}
      secretName: qbittorrent-tls
  rules:
    - host: qbittorrent.${CLUSTER_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qbittorrent
                port:
                  number: 8080