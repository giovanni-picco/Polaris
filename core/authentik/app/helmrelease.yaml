apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 10m
  chart:
    spec:
      chart: authentik
      version: "2026.2.2"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: authentik
  install:
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    authentik:
      error_reporting:
        enabled: true
      email:
        host: "smtp-relay.brevo.com"
        port: 587
        timeout: 30
        from: "no_reply@${CLUSTER_DOMAIN}"
    global:
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: secret-key-cred
              key: secret_key
        - name: AUTHENTIK_POSTGRESQL__HOST
          valueFrom:
            secretKeyRef:
              name: authentik-pg-app
              key: host
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-pg-app
              key: password
        - name: AUTHENTIK_EMAIL__USERNAME
          valueFrom:
            secretKeyRef:
              name: smtp-cred
              key: username
        - name: AUTHENTIK_EMAIL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: smtp-cred
              key: password
    server:
      name: server
      replicas: 1
      ingress:
        enabled: true
        ingressClassName: cilium
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt
          external-dns.alpha.kubernetes.io/hostname: sso.${CLUSTER_DOMAIN}
        hosts:
          - sso.${CLUSTER_DOMAIN}
        tls:
          - hosts:
              - sso.${CLUSTER_DOMAIN}
            secretName: authentik-tls
        https: false
      resources:
        requests:
          cpu: 500m
          memory: 1G
        limits:
          cpu: 1500m
          memory: 2Gi
      metrics:
        enabled: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
    worker:
      name: worker
      replicas: 1
      metrics:
        enabled: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      resources:
        requests:
          cpu: 500m
          memory: 2G
        limits:
          cpu: 1500m
          memory: 3Gi
    postgresql:
      enabled: false