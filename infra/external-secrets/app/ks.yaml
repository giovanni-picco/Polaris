apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-external-secrets
  namespace: flux-system
spec:
  interval: 5m
  path: ./infra/external-secrets/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-cilium-config
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars