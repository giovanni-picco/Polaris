apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-external-dns
  namespace: flux-system
spec:
  interval: 5m
  path: ./polaris
  prune: true
  sourceRef:
    kind: GitRepository
    name: external-dns
  dependsOn:
    - name: infra-bitwarden-secret-manager
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars