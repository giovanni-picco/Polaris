apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-letsencrypt
  namespace: flux-system
spec:
  interval: 5m
  path: ./infra/cert-manager/letsencrypt
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-cert-manager
    - name: infra-bitwarden
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars