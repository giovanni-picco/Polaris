apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-longhorn
  namespace: flux-system
spec:
  interval: 5m
  path: ./infra/longhorn/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-cilium
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars