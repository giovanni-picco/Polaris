apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-bitwarden-sdk-server
  namespace: flux-system
spec:
  interval: 5m
  path: ./polaris
  prune: true
  sourceRef:
    kind: GitRepository
    name: bitwarden-sdk-server
  dependsOn:
    - name: config
    - name: infra-cert-manager
    - name: infra-external-secrets