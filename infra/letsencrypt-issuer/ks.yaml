apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-letsencrypt-issuer
  namespace: flux-system
spec:
  interval: 5m
  path: ./letsencrypt-issuer/polaris
  prune: true
  sourceRef:
    kind: GitRepository
    name: cert-manager
  dependsOn:
    - name: infra-cert-manager
    - name: infra-bitwarden-secret-manager
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars