---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dashboard-longhorn-certificate
  namespace: longhorn-system
spec:
  secretName: dashboard-longhorn-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: longhorn.${CLUSTER_DOMAIN}
  dnsNames:
    - longhorn.${CLUSTER_DOMAIN}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dashboard-longhorn-ingress
  namespace: longhorn-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`longhorn.${CLUSTER_DOMAIN}`)
      kind: Rule
      services:
        - name: longhorn-frontend
          port: 80
          scheme: http
  tls:
    secretName: dashboard-longhorn-tls